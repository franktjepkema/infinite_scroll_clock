name: infinite_scroll_clock
description: "Infinite Scroll Clock - Kinetic Sculpture Digital Display"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  shared_preferences: ^2.5.5
  wakelock_plus: ^1.6.1     # Keeps screen on for installation

  # Optional: Better for future generative art
  # vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Custom fonts (recommended for Helvetica Neue alternative)
  # fonts:
  #   - family: HelveticaNeue
  #     fonts:
  #       - asset: fonts/HelveticaNeue-Regular.ttf
  #       - asset: fonts/HelveticaNeue-Light.ttf
  #         weight: 300